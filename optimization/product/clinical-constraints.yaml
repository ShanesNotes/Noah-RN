# Noah RN — Clinical Constraints for Meta-Harness Optimization
# Source: docs/noah-rn-phase2-prd.md Section 0
# These constraints are checked by the eval harness and validator.
# Any candidate violating ANY constraint is automatically rejected.

version: "1.0.0"
last_verified: "2026-03-31"
source: "docs/noah-rn-phase2-prd.md"

regulatory:
  classification: "HITL Category II — documentation assistance"
  cds_exemption:
    - no_image_analysis
    - displays_analyzes_medical_info
    - supports_without_replacing_judgment
    - enables_independent_review
  constraint: "No skill may produce autonomous clinical decisions without human review"

accuracy_hierarchy:
  layer_0: "Deterministic plausibility checks (non-LLM, hard-coded)"
  layer_1: "Input validation and sanitization at every boundary"
  layer_2: "Skill-level completeness checklists (omission > commission)"
  layer_3: "Confidence calibration in output"
  layer_4: "Human review"

output_format:
  spec: "four-layer explanation"
  layers:
    - summary
    - evidence
    - confidence
    - provenance
  footer_template: "Generated by noah-rn v{version} / {skill_name} v{skill_version} / {knowledge_source} v{knowledge_version}"

provenance:
  required_fields:
    - source
    - version
    - date
    - last_verified

model_agnosticism:
  constraint: "No skill, hook, or agent may contain provider-specific API calls"

optimizer_constraints:
  never_modify:
    - "knowledge/ files"
    - "tools/ bash scripts"
    - "hook validation thresholds"
    - "safety disclaimers"
  never_remove:
    - "completeness checklist items"
    - "four-layer output format"
    - "HITL review requirements"
  never_lower:
    - "confidence thresholds"
    - "hook firing sensitivity"
  always_include:
    - "RATIONALE.md in every candidate"
    - "Full modified files (not partial diffs)"

optimization_priority:
  - clinical_correctness_failures  # veto-weight
  - completeness
  - clinical_correctness
  - confidence_calibration
  - format_compliance

confidence_tiers:
  tier_1: "National guidelines — present exactly"
  tier_2: "Bedside suggestions — labeled as such"
  tier_3: "Facility-specific — requires local config, do not guess"
