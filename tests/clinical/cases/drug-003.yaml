    important_items:
      - "Mentions hemodynamic monitoring while titrating"
      - "Mentions reassessment of perfusion or volume status"
    nice_to_have:
      - "Mentions vasopressor administration safety considerations"
  expected_confidence_tier: 2
  expected_routing:
    primary_skill: drug-reference
    secondary_skills: []
  confidence:
