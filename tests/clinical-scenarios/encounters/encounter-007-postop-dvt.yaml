notes: |
  The missed lovenox dose is the crux — it's a real failure mode and Noah should
  document it clearly without editorializing. Wells DVT score on this patient is
  clinically high (cancer = 1, calf tenderness = 1, unilateral swelling = 1, no
  alternative diagnosis = 1, recent surgery/immobility = 1 — total ~4-5 points, high
  probability). Oxycodone/codeine allergy is a classic nursing question: phenanthrene
  opioids have theoretical cross-reactivity but clinical cross-allergy to oxycodone
  from codeine is low — Noah should not call it contraindicated but should flag the
  class and recommend pharmacist/physician verification. Wells PE with no respiratory
  symptoms tests whether Noah applies the tool with appropriate clinical context vs
  mechanically ruling in/out PE.
