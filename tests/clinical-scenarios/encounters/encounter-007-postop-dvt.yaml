test_id: "encounter-007"
description: "Post-op colectomy with new unilateral leg swelling — DVT/PE workup, Wells scoring, missed prophylaxis dose"
severity: moderate
patient_handoff: |
  Hey. So I'm handing off a 58-year-old female, full code, room 14.
  Allergies: codeine — vomiting.
  Covering: general surgery, Dr. Kim.

  She's post-op day 3 from an open colectomy for colon cancer. History is the colon
  cancer — just diagnosed — hypertension, obesity with a BMI of 38, and she's a former
  smoker, quit about 5 years ago. Surgery apparently went well.

  She's been recovering okay, passing gas, tolerating clears, vitals have been stable.
  She started ambulating post-op day 1 but honestly she hasn't been great about getting
  up. Incisional pain is her excuse and I get it, but she's been pretty bedbound.

  She's been getting lovenox 40 milligrams subcutaneous daily for DVT prophylaxis, but
  here's the thing — yesterday's dose got missed. She was down in CT for a follow-up
  scan and it just fell through the cracks in the shuffle. Nobody caught it until today.

  So this morning during my assessment — her left leg is noticeably more swollen than
  the right. Calf is tender to palpation. Warm. She said it's been achy since yesterday
  but she figured it was just from laying in bed and didn't say anything. I'm thinking
  DVT. With her cancer, the missed dose, the immobility, the surgery — this fits. I
  already paged Dr. Kim. He ordered a stat duplex ultrasound of the left leg and a
  D-dimer. He wants us to hold the lovenox for now until we know what we're dealing
  with. If it comes back positive they'll probably go to therapeutic heparin.

  Assessment otherwise: she's alert and oriented, good spirits actually, a little
  anxious now that I've explained why I'm worried about her leg. Pain is 5 out of 10
  at the incision, controlled. She's on Tylenol and oxycodone 5 milligrams PO every 4
  hours as needed. Got her last dose about 3 hours ago. Breathing fine, on room air,
  sats 98%. No chest pain, no shortness of breath — and I asked specifically given
  what I'm thinking.

  Heart rate 92, BP 138 over 82. Abdomen is soft, incision is clean, dry, and intact
  with staples, bowel sounds present. Voiding on her own.

  Lines: 20 gauge right hand, saline lock.

  Labs: H&H stable, platelets 342, INR 1.0. No recent coags. D-dimer is drawn and
  pending. Duplex ultrasound is ordered stat.

  Daughter is coming in this afternoon.

  Heads up — if the duplex is positive, we're going to need to move fast on the heparin
  drip order. Worth knowing where your heparin protocol is before that call comes in.

