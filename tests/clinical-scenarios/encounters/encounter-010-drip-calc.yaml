notes: |
  The drip calculations here are deterministic — they must produce exact answers.
  Reference values for reviewers:
    Dobutamine 5 mcg/kg/min × 92kg = 460 mcg/min = 27,600 mcg/hr ÷ 1000mcg/mL = 27.6 mL/hr
    Heparin 18 units/kg/hr × 92kg = 1,656 units/hr ÷ 50 units/mL = 33.12 mL/hr (round to 33.1)
    Dobutamine wean to 2.5 mcg/kg/min × 92kg = 230 mcg/min = 13,800 mcg/hr ÷ 1000mcg/mL = 13.8 mL/hr
  Any skill output with wrong numbers on these calculations is a hard fail.
  Dobutamine in a patient with an ICD is a real clinical nuance — inotropes can
  increase arrhythmia burden and trigger ICD therapy. The drug-reference skill
  should surface this without being alarmist (it's not a contraindication, it's
  a monitoring priority).
  The PA catheter detail tests whether the skill correctly identifies it as a
  monitoring-only line and does not suggest it for medication administration.
  Negative fluid balance in CHF should be contextualized — being net negative is
  the therapeutic goal here, not a problem. The io-tracker skill should not
  flag negative balance as a concern without the clinical context.
  CKD4 patient on strict I&O with aggressive diuresis — renal function monitoring
  is a legitimate flag even in the context of therapeutic diuresis.
