description: "ICU drip math — dobutamine and heparin weight-based rate calculations, wean adjustment, strict I&O — 68M acute decompensated CHF stabilizing"
severity: moderate
patient_handoff: |
  Good morning. Room 7, MICU. 68-year-old male. Full code. Allergies: NKDA.
  Covering is MICU — Dr. Okonkwo is your attending today.

  He came in three days ago in acute decompensated heart failure — flash pulmonary
  edema. The ER tubed him, he was in really bad shape. Extubated yesterday, doing
  a lot better. EF is 15% — this is end-stage CHF. He's also got afib, CKD stage
  4, and an ICD in place. The afib has been rate-controlled throughout, nothing
  concerning on telemetry.

  They diuresed the heck out of him — he's down 6 kilograms from admission weight.
  Weight this morning is 92 kilograms. That's your number for everything today.

  He's on dobutamine for inotropy and cardiology wants to start weaning today.
  He's also on heparin for the afib. Both drips are running and you need the
  rates confirmed before I leave.

  Here's the math for this morning:

  Dobutamine is ordered at 5 micrograms per kilogram per minute. The bag we have
  mixed is 250 milligrams in 250 milliliters — that works out to 1 milligram per
  milliliter, which is 1000 micrograms per milliliter. Patient is 92 kilograms.
  I need the pump rate in milliliters per hour.

  Heparin is ordered at 18 units per kilogram per hour for the afib — this is
  the weight-based protocol. Bag is 25,000 units in 500 milliliters, so that's
  50 units per milliliter. Same 92 kilogram patient. Rate in milliliters per hour.

  And when cardiology comes in to wean the dobutamine, they want to drop it by
  2.5 micrograms per kilogram per minute at a time. So I need the new pump rate
  at the 2.5 dose for handoff — same bag, same concentration.

  Quick assessment before I hand him off: Alert, oriented, breathing comfortably
  on 2 liters nasal cannula, sats 96%. He's talking in full sentences which is
  a big change from admission. Heart rate 82, afib — rhythm is controlled. Blood
  pressure 110/68 on the dobutamine. Peripheral edema is 1 plus now, down from
  3 plus on admission — the diuresis is working. He's on strict intake and output.
  Last 12 hours: 850 milliliters in, 1200 milliliters out. Net negative 350 for
  that window.

  Lines: right internal jugular triple lumen — that's where your drips run.
  Dobutamine and heparin through the IJ only. 20 gauge left hand, good, patent —
  that's for flushes and any IV push meds. PA catheter is in for hemodynamic
  monitoring, cardiology is reading it. Do not use it for meds, just leave it
  alone. Transducer is zeroed and leveled at the phlebostatic axis.

  Labs pending this morning: BMP for the creatinine — CKD4 patient, strict I&O
  is partly about watching the kidneys. BNP was 4200 on admission, repeat ordered
  this morning. PTT for the heparin — draw at 0800.

  Nothing else major. He's a lot more stable than he was 48 hours ago. The big
  ticket today is the dobutamine wean and making sure those drip rates are right
  before cardiology rounds.

  Family — wife checks in by phone in the mornings, she lives about an hour away
  and comes in the afternoon. Number is on the board.

  Any questions on the math before I go?

