notes: |
  The succinylcholine contraindication in hyperkalemia (K+ ≥ 5.5, especially ≥ 6.0)
  is an absolute safety rule. Succinylcholine causes potassium efflux from
  depolarized muscle cells — in a patient already at 6.8, this can precipitate
  fatal ventricular arrhythmia. Any Noah skill output that recommends sux here,
  or fails to flag the contraindication, is a hard test failure.
  Rocuronium 1.2mg/kg x 75kg = 90mg. Sugammadex must be present before pushing
  rocuronium — this is a safety prerequisite, not an afterthought.
  The AV fistula note is a classic ICU teaching point — dialysis-dependent patients'
  fistulas are frequently accessed by accident. Any structured output must flag it
  prominently as do-not-use for blood draws, IVs, and BP cuffs.
  The morphine allergy (nausea) is a tolerance/adverse effect, not a true allergy —
  it should be captured but the skill should note it's a GI adverse effect, not
  anaphylaxis, which is clinically distinct. This tests allergy nuance.
  Ketamine rationale: hemodynamically unstable-ish (tachycardic) + active
  bronchospasm risk from pneumonia + don't want BP crash = ketamine over propofol.
  Etomidate is also reasonable — skill may present both but ketamine should be
  affirmed as appropriate here.
