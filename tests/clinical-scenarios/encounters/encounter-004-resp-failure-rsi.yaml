description: "Respiratory failure requiring RSI — ESRD with hyperkalemia K+ 6.8, succinylcholine contraindicated, rocuronium RSI"
severity: critical
patient_handoff: |
  Hey, good morning. Room 6 — grab a coffee first because this one's been a night.

  48-year-old female, full code. Allergy: morphine, gives her nausea — no opioids
  by mouth or IV without checking first. Covering MICU. Consults: nephrology and
  pulmonology, both aware and both came by overnight.

  She's been here two days for pneumonia — started out on the step-down floor,
  transferred to us yesterday afternoon when she started working harder. History:
  ESRD on dialysis, lupus, hypertension, chronic anemia. Dialysis is Monday,
  Wednesday, Friday — she missed both Monday and Wednesday this week because she
  was in the hospital and nobody coordinated it. That is a big part of what's
  happening right now.

  So overnight she has progressively gone downhill. I got her at the start of the
  shift on high-flow at 40 liters, 60 percent. I've had to crank it up throughout
  the night — right now she's on 60 liters, 100 percent FiO2, and she's still
  desatting to 88-89. She is working hard. Accessory muscles, tripoding when she
  sits up, two-word sentences max. She is exhausted. I've been watching her get
  tired for the last two hours and I called the MICU resident at 0530 — they're
  at bedside right now, they're going to intubate.

  Neuro — alert. She's oriented times two, she knows her name and that she's in
  the hospital, she cannot tell you the date. That's baseline for her apparently,
  per her chart. She's fatigued. I tried to do a pain assessment and she gave me
  this look like she can't spare the breath to answer me. I'm not seeing grimacing
  or guarding but I wouldn't call her assessment reliable right now just because
  of the work of breathing.

  Cardiac — tachycardic, HR 128. BP 156 over 92, MAP 113. That's actually running
  on the high side but the MICU team has looked at it, the thought is ketamine for
  induction given that she's tachycardic and we don't want to tank her BP with
  propofol. I'd rather have her a little hypertensive than crash her.

  Labs — potassium came back at 6.8 this morning. That's from two missed dialysis
  sessions, nephrology knows, they want her intubated first and then they'll get her
  on the machine. Bicarb is 16 — she's acidotic. Creatinine 8.2. So she's in bad
  shape renally. This is the important one for RSI: with a potassium of 6.8,
  succinylcholine is absolutely contraindicated. Depolarizing agent in hyperK can
  push the potassium higher and throw her into a fatal arrhythmia. Do not let anyone
  near her with sux. The resident knows, but if there's any confusion at that bedside,
  speak up. We're going with rocuronium. She's 75 kilos — 1.2mg per kilo, that's
  90mg of rocuronium. Have sugammadex at the bedside for reversal. That's the only
  reversal agent for roc and it needs to be there before you push the paralytic.

  For induction: ketamine, 1 to 1.5mg per kilo. At 75 kilos that's roughly
  75 to 112mg. Resident said they want 100mg. Ketamine is good here — it's a
  bronchodilator, maintains BP, she's got the pneumonia and the hemodynamics. Makes
  sense.

  She has been NPO since midnight in anticipation of this. Foley is in place — she
  is basically anuric, she's dialysis-dependent. I've had maybe 15mL out in the last
  four hours and I think it's the catheter draining what's sitting in her bladder.
  Don't read too much into the urine output. It won't change.

  GI — NPO, no tube yet obviously, that goes in with intubation. Abdomen soft,
  no complaints.

  Skin — this is something to be careful about. She's been on steroids long-term
  for the lupus. Her skin is fragile. I've got some bruising on her forearms already
  and I didn't do anything to cause it — that's just where she is. Be gentle with
  tape and dressings. Repositioning she's going to need q2h and you'll need to be
  soft about it. No breakdown yet but she's at risk.

  Lines — 18 gauge right hand. It's sluggish. It flushes but takes pressure. I
  wouldn't hang anything time-sensitive through it as your only access. They'll
  probably place a central line when they intubate her. Left arm — she has an AV
  fistula. Do not use it. Do not access it, do not put a blood pressure cuff on
  that arm, do not draw from it. That fistula is her dialysis access and if something
  happens to it she has nothing. I put a note on her arm but remind anyone who comes
  near her.

  No arterial line yet — that'll probably go in post-intubation too.

  Family — her mom is healthcare POA. She called about 30 minutes ago from I think
  a 45-minute drive out. She's on her way. The patient has been told what's happening
  and she understands, she nodded when I explained we need to put a breathing tube in.
  She's scared but she's not refusing. Mom isn't here yet, so consent situation may
  be tight — the team is aware.

  So your immediate priorities walking in: that intubation is happening right now.
  Have rocuronium 90mg and sugammadex at the bedside. No sux on that room, I don't
  want it within reach. Ketamine drawn up. SOAP-ME is ready — I set it up before
  I came to give you report. After intubation: vent settings, central line, art line,
  and dialysis coordination with nephrology. And handle mom when she arrives — she's
  going to be walking in on her daughter intubated.

  That's Room 6. Anything you need from me?

