notes: |
  MAP calculation: MAP = DBP + (1/3)(SBP - DBP) = 118 + (1/3)(192-118) = 118 + 24.7 ≈ 143.
  The 20-25% MAP reduction rule is critical — it's the most important clinical concept
  in hypertensive encephalopathy management. The rationale: the cerebrovascular
  autoregulation curve is shifted rightward in chronic hypertension, so a blood pressure
  that looks "normal" is actually cerebral ischemia territory for this patient.
  Aggressive BP reduction → watershed stroke.
  Nicardipine is preferred over nitroprusside for hypertensive encephalopathy because:
  1) predictable titration, 2) no cyanide toxicity risk (relevant for prolonged use),
  3) does not cause reflex tachycardia as aggressively.
  The peripheral IV for nicardipine is controversial — some institutions require
  central access, others do not. The drug is generally considered peripherally safe
  at standard rates. Noah should not mandate central access but should note it as
  institution-specific.
  Troponin elevation in hypertensive emergency is common (demand ischemia / type 2 MI)
  and does NOT necessarily mean the patient needs to go to the cath lab. Context matters.
  The "worst headache of his life" workup is the right place for a thunderclap headache
  protocol — CT negative, LP negative rules out SAH with >99% sensitivity. The neuro
  exam and blood pressure management are the clinical priorities now.
