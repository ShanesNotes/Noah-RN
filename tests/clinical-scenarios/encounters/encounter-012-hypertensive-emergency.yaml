patient_handoff: |
  Good morning. Room 2, MICU. 58-year-old male. Full code. Allergies: NKDA.
  Covering is Dr. Ramanujan, neurology is consulting.

  He came up from the ER at 0300. His wife called 911 because he was confused
  and complaining of a severe headache — the worst headache of his life, she said.
  That got them worried about subarachnoid, so the ER did a stat CT head. That
  came back negative for bleed. LP was done, also negative for blood or xanthochromia.
  So they're not calling it SAH. The working picture is hypertensive encephalopathy —
  his blood pressure in the ER was 218 over 134. He takes three blood pressure
  medications at home but he ran out of all of them about a week ago and hasn't
  been able to get to the pharmacy.

  We started nicardipine here, which is what neuro recommended — they want a calcium
  channel blocker for this picture, not nitroprusside. He's currently on 5mg per hour.
  The order says titrate by 2.5mg/hr every 15 minutes to goal MAP less than 130 —
  and this is important — do NOT drop the pressure too fast or too much. In
  hypertensive encephalopathy we're targeting a 20 to 25 percent reduction in MAP
  over the first hour, not normalizing it. Overcorrection can cause a stroke in
  the other direction.

  His current blood pressure is 192 over 118. MAP right now is about 143. His
  admission MAP was 162. We're making progress. Neuro is coming in this morning to
  reassess. They want hourly blood pressure checks, Q2 neuro exams, and a follow-up
  MRI when he's stable enough.

  The confusion is improving. He was disoriented, not tracking conversation in the
  ER. Now he's awake, oriented times 2 — knows his name and knows he's in a hospital,
  doesn't know the date or year. Wife says that's not his baseline — he's sharp
  normally. GCS right now is 14 — eyes 4, verbal 4, motor 6. The headache is still
  there, 6 out of 10, it was 10 when he came in.

  History: hypertension, CKD stage 3 — creatinine today was 2.1, which is above
  his baseline of 1.4 per old records. The renal team may get involved as well.
  Hypertensive emergency can cause acute kidney injury.

  Vitals: BP 192/118, HR 88 sinus, RR 16, sats 97% on 2 liters nasal cannula,
  temp 37.2. He's not tachycardic, which is somewhat reassuring.

  Lines: 20 gauge right hand — nicardipine is running through it. I know calcium
  channel blockers can be peripherally administered, and that's confirmed in the
  orders. 18 gauge left AC — saline lock, good, patent. They tried to get an
  arterial line but he wouldn't cooperate in the ER — he was too agitated. Neuro
  may order one this morning. In the meantime we're doing cuff BPs every 15 minutes
  on the right arm opposite the IV.

  Labs: BMP from 0400 showed that creatinine of 2.1 I mentioned. K was 4.0, decent.
  CBC was unremarkable. Troponin was mildly elevated at 0.08 — they'll repeat at
  0800 to trend it. Urinalysis was sent, results pending.

  To-do this morning: hourly blood pressure q15min until target then q1h, Q2 neuro
  exams, repeat troponin at 0800, repeat BMP this afternoon for the creatinine,
  neurology follow-up, and if he's cooperative enough they want a right radial a-line
  placed. No food or water — he's NPO pending the neuro assessment of his swallow.

  MAP math for you — goal is 20-25% reduction from 162. That's target MAP 122 to 130.
  We're at 143 now. Almost there. Don't overshoot.

