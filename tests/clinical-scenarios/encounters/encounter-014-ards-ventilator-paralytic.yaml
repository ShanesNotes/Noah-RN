patient_handoff: |
  Good morning. Room 1, MICU. 28-year-old female. Full code. Allergies: NKDA.
  Covering is Dr. Huang, pulm-crit. No family contact yet — she came in alone.
  Social work is involved. There are some safety concerns.

  She was found unresponsive in her apartment yesterday by a friend, who called
  911. Suspected polydrug OD — empty bottles of her prescribed extended-release
  oxycodone and Xanax were at the scene. Tox in the ER was positive for
  benzodiazepines and opioids. They intubated her in the ER for airway protection.
  She aspirated — the ER team saw gastric contents in her mouth and oropharynx when
  they got there. So her ards picture developed over about 8 hours after intubation.

  P/F ratio right now is 78 — that's severe ARDS. She's on ARDSnet ventilation:
  tidal volume 6mL per kilogram of ideal body weight. She's 5 foot 6 inches, which
  gives an IBW of 60 kilograms, so tidal volume target is 360mL. I have her set at
  360. Plateau pressure this morning was 28. PEEP is at 14. FiO2 is 0.70. Driving
  pressure is 14 — we want that under 15, and we're just under the wire.

  She's on a cisatracurium infusion for the paralytic — 37.5mg in 250mL, that's
  0.15mg per mL. She's ordered at 0.2mg per kilogram per hour. She's 72 kilograms
  of actual body weight. We use actual body weight for drug dosing, not IBW.
  Calculate the rate for me.

  She's deeply sedated — propofol at 30mcg per kilogram per minute (actual 72kg),
  and fentanyl at 50 mcg per hour. You can't assess her RASS or CPOT while she's
  paralyzed — just document that NMB agent is active. When we turn off the paralytic
  to check train-of-four, that's when you'll get your sedation assessment window.

  We proned her for 16 hours last night per the PROSEVA criteria — P/F below 150
  with optimal PEEP. That's completed. She was supined this morning at 0600. Still
  in the window of monitoring for post-proning complications: facial edema is
  moderate — her face is pretty puffy but expected, that's from the prone. Check
  the pressure points: forehead, cheeks, chin. She had foam padding under all of
  them. Right eye had some mild conjunctival chemosis — keep eye drops in place,
  Q2 hour eye care, keep the lids taped.

  Lines: right femoral triple lumen — that's your main line. Propofol and fentanyl
  both running through it. Cisatracurium running through the second port. Keep
  those clearly labeled — you don't want to mix up your propofol and your paralytic.
  18 gauge right AC — just used for labs and blood products if needed.
  Right femoral arterial line — waveform is good, correlates. Use that for all ABGs
  and blood draws — don't stick her unnecessarily.

  Labs from the 0200 ABG: pH 7.32, PaCO2 48, PaO2 64, bicarb 24. We're accepting
  permissive hypercapnia and permissive hypoxemia per ARDSnet — target PaO2 55-80,
  pH above 7.30. She's borderline on the pH. If that pH drops below 7.30 we'll
  need to adjust.

  She made 120mL of urine the last 2 hours. Kidney function is probably taking
  a hit — watch that creatinine. Daily weights and strict I&O.

  To-do this morning: 0800 ABG, Q4 neuromuscular blockade check (train-of-four),
  Q2 eye care, Q2 pressure point inspection, daily weights, BMP for creatinine,
  and pulm-crit rounds are at 0900 — they'll decide on PEEP and FiO2 adjustments
  based on the morning ABG.

