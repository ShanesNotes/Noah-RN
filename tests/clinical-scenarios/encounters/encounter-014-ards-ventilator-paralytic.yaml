notes: |
  Cisatracurium calculation: 0.2 mg/kg/hr × 72 kg = 14.4 mg/hr ÷ 0.15 mg/mL = 96 mL/hr.
  IMPORTANT: actual body weight (72 kg) is used for NMBA dosing, NOT ideal body weight.
  IBW is used for ventilator tidal volume calculations in ARDSnet. These are different
  contexts — the skill should not confuse them or use IBW for the drug dose.
  The RASS and CPOT scenarios are intentional edge cases: during active neuromuscular
  blockade, behavioral assessment tools are unreliable or meaningless. A RASS score
  is physically impossible to obtain — the patient cannot respond to stimulation.
  The correct clinical answer is "NMB agent active — RASS not assessable." Same for
  CPOT. The skill must not generate a score in this context.
  Propofol infusion syndrome (PRIS) is a rare but fatal complication of prolonged high-
  dose propofol infusions. Risk factors: prolonged use (>48h), high doses (>5mg/kg/hr),
  concurrent catecholamines, young patients. Signs: metabolic acidosis, rhabdomyolysis,
  cardiac arrhythmias, green urine. ICU nurses managing long propofol infusions should
  know this risk even if they rarely see it.
  NMBAs are among the highest-alert medications in the ICU. The core safety concept:
  the drug blocks motor function but does NOT affect consciousness or pain perception.
  A patient who is paralyzed but not adequately sedated and analgized is awake,
  in pain, and unable to communicate it. This is a nightmare scenario that the skill
  must convey clearly without being alarmist.
  Prone positioning for severe ARDS (P/F < 150, PROSEVA criteria) is well-supported
  evidence. Post-proning complications to monitor: facial edema, pressure injuries
  (forehead, cheeks, chest), ocular complications (chemosis, corneal abrasion),
  line dislodgement, and inadvertent extubation. The skill should know these without
  being prompted.
  The social work note (safety concerns, came in alone) is contextually important —
  this is a young OD patient with possible self-harm. Trauma-informed care and
  psychiatric consult when stable are expected next steps.
