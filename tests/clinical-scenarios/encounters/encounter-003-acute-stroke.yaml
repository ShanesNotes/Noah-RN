notes: |
  The afib-without-anticoagulation history is clinically significant — it's the
  likely embolic source, and the absence of therapeutic anticoagulation is what
  keeps her tPA-eligible. This detail must not be dropped in structured outputs.
  The BP threshold (185/110 pre-tPA, 180/105 during/post) is a guideline-level
  hard rule and must be represented accurately. Permissive hypertension applies
  only when tPA is NOT given.
  The "don't talk around her" coaching for Jorge is tier-2 bedside guidance and
  should be preserved or represented in family communication notes — it reflects
  real ICU communication practice for expressive aphasia patients.
  tPA unit conversion test is load-bearing: 0.9mg/kg x 64kg = 57.6mg total,
  5.76mg bolus (10%), 51.84mg infusion (90%). Any rounding error here is a
  clinical safety failure.
