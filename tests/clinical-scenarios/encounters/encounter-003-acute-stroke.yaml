test_id: "encounter-003"
description: "Acute ischemic stroke — left MCA occlusion, tPA about to start, neuro monitoring intensive"
severity: critical
patient_handoff: |
  Morning. Room 3, this is your time-critical one so let me get right into it.

  71-year-old female. Full code. NKDA — no allergies. Neuro stroke team is covering.
  She came in this morning via EMS. Last known well was 90 minutes ago at breakfast —
  husband says she dropped her coffee cup, right arm went completely limp, and her
  speech was garbled. He called 911 immediately, so the timeline is tight but it's
  good.

  CT head in the ED — negative for bleed. CTA showed left MCA occlusion. Stroke
  team saw her in the ED, NIHSS was 14. They've cleared her for tPA.

  History: afib — but she's not on anticoagulation. She declined it, apparently,
  some conversation about bleeding risk with her cardiologist a while back. So
  there's no therapeutic anticoag on board. Also has hypertension and hypothyroid.
  She takes levothyroxine, amlodipine, lisinopril — nothing that interferes with
  tPA. INR came back 1.0, platelets 198, glucose 142. All green for tPA eligibility.

  Now — her BP. She came in at 172 over 96. That is below the tPA threshold of
  185 over 110, so they're cleared to go without having to treat the BP first.
  But watch it. If her systolic climbs above 185 before or during the infusion,
  call the team right now — that changes everything. During and after tPA they want
  her below 180 over 105. I have the labetalol drawn up and sitting at the bedside
  just in case. Know where it is.

  Neuro right now — she's alert, opens eyes spontaneously, tracks you, follows
  some commands with the left side. She knows something is wrong with her, she's
  anxious and frustrated. Expressive aphasia — she can't get words out cleanly,
  she'll start a sentence and lose it. She understands you though. Don't talk
  around her like she's not there, she hears everything. Right hemiplegia — the
  right arm is flaccid, right leg is significantly weak. Right facial droop. She's
  neglecting her right visual field. No pain behaviors that I can see, but she
  can't really tell you either way.

  Respiratory — she's on room air, sats 97%. Breathing fine. No aspiration concerns
  at rest but she is NPO — swallow eval has to happen before she gets anything by
  mouth.

  Cardiac — NSR, no afib on the monitor right now, HR 82. BP 172 over 96 last check,
  was cycling every 15 minutes in the ED. Once the tPA starts I want continuous BP
  cycling at q15min minimum during the infusion and for the two hours after.

  GU — Foley was placed in the ED. Clear yellow urine draining. I know the stroke
  protocol says avoid Foley unless necessary but she was incontinent in the ED and
  they made the call. It's in, document it.

  Skin is intact. No breakdown, no wounds.

  Lines — she's got a 20 gauge left AC and an 18 gauge left hand. That's it. Stroke
  team specifically said they want the right arm kept free for neuro checks — right
  arm is hemiplegic anyway so it's not great access, but they don't want anything
  on that side. No drips running yet, just a saline lock. tPA is going to go through
  the left AC.

  Okay, so tPA — the dose is calculated. She weighs 64 kilos. 0.9mg per kilo is
  57.6mg total. 10% as the bolus — that's 5.76mg — push it over one minute. The
  remaining 51.84mg runs over 60 minutes. I have it already drawn up and labeled.
  The pharmacist verified the dose. Do not give anticoagulants or antiplatelets for
  24 hours after tPA — that's a hard rule.

  Once the infusion starts: neuro checks every 15 minutes for the first two hours,
  then every 30 minutes for six hours, then hourly for sixteen hours. That's the
  protocol cadence. If she has any acute neuro decline during the infusion — new
  headache, BP spike, decreased LOC, any hemorrhage sign — stop the tPA immediately
  and call the team. Don't hesitate on that.

  The husband, Jorge, is at the bedside. He's been there the whole time and he is
  very anxious — understandably so, he watched this happen. He keeps asking if she's
  going to be okay. He's been told the plan but he may ask you again. He speaks
  English well, just scared. Be patient with him. He doesn't have good medical
  literacy so keep it plain language.

  Big things for your shift: tPA infusion, BP control, neuro checks q15 during the
  infusion, watching for any hemorrhagic conversion, and the CTA already showed
  LVO so interventional neuro may come talk to her about thrombectomy — that's a
  conversation for the stroke team and the family, just know it's possible.

  That's Room 3. Any questions before I head out?

