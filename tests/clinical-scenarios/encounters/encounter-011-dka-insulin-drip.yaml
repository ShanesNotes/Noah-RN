notes: |
  Insulin drip calculation: 0.1 units/kg/hr × 68kg = 6.8 units/hr ÷ 1 unit/mL = 6.8 mL/hr.
  The DKA management nuances here are real:
  - Insulin should NOT be stopped when glucose hits 250 — the gap is still open.
    Instead, add dextrose and keep the insulin running. This is the most common
    DKA management error.
  - Potassium must be repleted BEFORE giving insulin if K < 3.5, because insulin
    drives K into cells and can produce life-threatening hypokalemia.
  - Kussmaul breathing (deep, labored respiratory pattern) is the respiratory
    compensation for metabolic acidosis — the tachypnea is not a respiratory problem,
    it is the patient compensating for the metabolic acidosis. Should not be
    treated with supplemental O2 or anxiolytics — it resolves as the acidosis closes.
  - Cerebral edema is rare in adults but it's the feared complication. Neuro changes
    during DKA treatment (even subtle ones) warrant immediate escalation.
  - Potassium 40mEq over 4h = 10mEq/hr peripherally — this is at the upper safe
    limit for peripheral infusion. K infusions >10mEq/hr require central access.
  The penicillin allergy check is intentional: nurses reflexively verify cross-
  reactivity, and the answer is no, insulin has no relationship to penicillin.
