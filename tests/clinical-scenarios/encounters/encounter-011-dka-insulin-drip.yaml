patient_handoff: |
  Hey, morning. Room 4, MICU. 34-year-old female. Full code. Allergies: penicillin —
  hives. Covering is Dr. Vargas, endocrine consult is Dr. Osei.

  She came in last night through the ER in DKA. Type 1 diabetic, on a pump at home,
  but she ran out of insulin three days ago and didn't refill. Glucose in the ER was
  520. pH was 7.10, bicarb 8, anion gap was 26. Classic DKA picture.

  She's been getting aggressive fluid resuscitation — the ER pushed two liters of
  normal saline over the first two hours, then we started an insulin drip at 0.1
  units per kilogram per hour. She's 68 kilograms. We're using regular insulin.
  Concentration is 100 units in 100mL of normal saline — that's 1 unit per mL.

  We're also running potassium replacement as a continuous infusion. She came in
  with a K of 3.2 — low before we started the insulin, and insulin drives it down
  further. Per protocol we're replacing to keep K above 3.5 before insulin and
  above 4.0 during the infusion. Right now she's on 40mEq over 4 hours in her
  peripheral IV. Check the K at 0800 — critical lab, don't miss it.

  Her most recent labs about an hour ago: glucose 380, bicarb 12, pH 7.19, anion
  gap 22 — trending the right direction. She's not there yet but she's moving.
  Glucose check is Q1 hour on the insulin drip. If glucose drops below 250 we
  need to start dextrose and adjust per protocol — she should not be glucose-free
  on insulin in DKA because the insulin needs to stay running to close the gap,
  not just clear the glucose.

  She's been nauseous all night — vomiting before admission and dry retching in
  the ER. We have an NG tube in and we pulled 200mL of bilious fluid when it went
  in. She's NPO. Got zofran ordered PRN. She hasn't vomited again since about
  0200.

  Vitals trending better. She came in tachy to 128. Now she's 98. Temp 37.8 —
  low-grade, cultures were sent. Blood pressure 112/72 on her own. Breathing
  fast — she's Kussmaul breathing, RR is 22, which is the respiratory compensation
  for the acidosis. Sats 98% on room air. The tachypnea should correct as the
  acidosis closes — watch that respiratory rate.

  Neuro — she's alert and oriented times 4. She was a little foggy when she got
  here but much sharper now. She knows what DKA is, she knows what happened.
  She's pretty upset with herself about the insulin. That's worth a conversation
  with social work and maybe a diabetes educator when she's more stable.

  Lines: 18 gauge right AC — patent, good. 20 gauge left AC — potassium running
  through it. We gave her the potassium peripherally because she didn't have central
  access in the ER and the K was critical. The infusion rate is 10mEq per hour
  right now — that's within peripheral limits.

  Strict intake and output. NG output, urine, and all infusions tracked Q1 hour.
  Foley is in. She made 280mL this last hour — good sign that the resuscitation
  is working.

  To-do this morning: 0800 glucose and K+ critical labs, adjust insulin or
  dextrose per result, q1h glucose checks, watch for signs of cerebral edema
  (headache, neuro change — rare but it's the thing that kills DKA patients),
  and get endocrine in to see her. They want to transition her to subQ insulin
  when the gap closes and she can eat.

  She's going in the right direction but she's not out of the woods. Questions?

