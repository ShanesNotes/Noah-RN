notes: |
  Long-stay ICU patient — the accumulation of complexity is the point. Vancomycin/red
  man syndrome is a pretreatment scenario, not a true contraindication; Noah must not
  call it a hard allergy or omit the benadryl protocol. Central line on day 16 is a
  real clinical flag (guideline recs vary but most ICUs have a conversation at 14 days).
  Albumin 2.4 + stage 2 wound is the nutritional-wound-healing nexus — Noah should
  connect those dots. APACHE II on a complex patient tests data-gap handling: if
  labs/vitals aren't fully specified, Noah should note what's missing rather than guess.
  GCS 10T trach modifier is a common documentation confusion point.
