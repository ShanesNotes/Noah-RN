test_id: "encounter-006"
description: "ICU long-stay post-trauma — trach, skin breakdown, APACHE II, vancomycin allergy protocol"
severity: critical
patient_handoff: |
  Hey, morning. So I've got a 44-year-old female for you. Full code. Room 4.
  Allergies: latex and vancomycin — red man syndrome. She needs Benadryl 30 minutes
  before every vanco dose. That is not optional, do not let that slip.
  Covering: surgical ICU team. Active consults: wound care, nutrition, and ID.

  She's day 18 now from a motor vehicle accident. She came in with a ruptured spleen —
  had a splenectomy day 1 — multiple rib fractures, and a traumatic brain injury. No
  prior medical history. She was healthy before this.

  She was on the vent for 12 days. Got trached on day 10, Shiley #6. She's been on
  trach collar for 4 days now — 35% FiO2, saturating 96 to 98 percent. Breath sounds
  are diminished at both bases, which has been her baseline. She was on fentanyl and
  versed drips the first 10 days. We transitioned her to PO pain meds — she's getting
  Tylenol and gabapentin for the rib pain.

  Neuro: she follows commands, nods appropriately, writes on a whiteboard to communicate.
  GCS is 10T — eyes 4, verbal is 1T for trach, motor 5. RASS 0 today, she's been calm.
  Pain she reports 4 out of 10 at the rib sites at rest. Tylenol and gabapentin are
  managing it, she's not been reaching for anything else.

  Cardiovascular — heart rate 88, NSR. BP 118 over 72. Good pulses, warm extremities.

  GI — she's on tube feeds through a Dobhoff, at goal rate 55 mils an hour. She's
  tolerating them. Residuals are checked every 4 hours, last one was 20 mils. Nutrition
  team has been in and they are not happy with her albumin — it was 2.4 and prealbumin
  12. She's at goal but the healing just isn't there yet.

  GU — Foley draining clear yellow, good output. No concerns there.

  Skin — and here's the thing. She's got a stage 2 on her sacrum. Two centimeters by
  one and a half centimeters, shallow, pink wound bed, no tunneling, no exudate to speak
  of. Wound care is seeing her every other day. She's on a specialty mattress, we're
  turning her every two hours, and I've been applying barrier cream to the perineal area
  because she's also got some moisture-associated skin damage down there. Braden is 13.
  She is high risk and the wound is not going to heal with an albumin of 2.4.

  Lines: right subclavian triple lumen, day 16. That's getting close to the line change
  conversation — I'd flag it for rounds. Twenty gauge left hand. The Dobhoff. And the
  Shiley #6.

  Infusions: tube feeds at 55. Normal saline at 20 KVO through the central line.
  Vancomycin q12h — and again, Benadryl 30 minutes before every single dose. She had
  red man syndrome and it was bad. I drew the vanco trough at 0600, result is still
  pending.

  Labs: WBC 11.8, hemoglobin 8.2, albumin 2.4, prealbumin 12. Trough pending.

  Family: her husband and teenage daughter come in every day, usually around 10am.
  They're doing better emotionally than they were last week. She's been writing little
  notes to her daughter on the whiteboard which has helped.

  Heads up that the skin situation is going to get worse before it gets better given
  her nutrition numbers. I've already charted the wound and talked with wound care.
  Just keep the pressure redistribution consistent.

