test_id: "encounter-002"
description: "STEMI with intra-procedural VF arrest, ROSC achieved, post-arrest ICU care — TTM decision pending"
severity: critical
patient_handoff: |
  Good morning. Okay, Room 8 — this is a rough one, just giving you fair warning.

  55-year-old male. Full code. Allergies: PCN, rash only. Covering cardiology and
  MICU. Cardiology is primary right now.

  He came in overnight via EMS — classic STEMI presentation, chest pain radiating
  to the left arm, diaphoretic, the whole thing. BP was holding okay in the field.
  Went straight to the cath lab, but during the procedure he threw VF. Two rounds
  of CPR, two shocks, got ROSC. They finished the cath, got the culprit vessel
  opened — LAD. He's back from the lab maybe three hours now.

  History: hypertension, hyperlipidemia, smoker — pack a day for twenty-something
  years — and family history of MI. Dad had one at 50-something, so, not surprising
  he's here.

  So neuro-wise — he's intubated, sedated on propofol. GCS is 3T. Pupils equal but
  sluggish, maybe 3mm bilaterally. That's what I've been watching. Cardiology and
  MICU are having the TTM conversation this morning. As of right now no active
  cooling running, but that decision is not final. Just know that's coming up and
  they may want you to initiate something. Keep an eye on his temp — I've been
  running it q1h on the rectal probe.

  He's on the vent — AC mode, FiO2 50%, PEEP 5, rate 14, tidal 500. Sats been
  sitting 96-98%, so I've been titrating the FiO2 down slowly. Don't push it above
  98 — cardiology specifically said to avoid hyperoxia post-arrest. Last ABG was
  reasonable.

  Cardiac — NSR on telemetry since ROSC, no ectopy. HR sitting around 78. He's
  still on norepi at 0.04 — MAP's been hanging around 70-72, which is acceptable.
  They want MAP above 65 minimum. I haven't had to touch the norepi rate in the
  last two hours, so hopefully it's stable.

  He came back from the lab on amiodarone — got the 300mg IV push during the code,
  and now he's on the maintenance drip. I have it running at 1mg/min right now
  through the right IJ, which is where it should stay. That's running through the
  central line only — do not run that peripherally, it'll trash the vein.

  Heparin drip is also running post-cath, through the triple lumen. Make sure you
  pull the PTT at 0800 — they'll want to dose-adjust.

  Troponins — initial was 12, repeat was pending when I came on. I drew it at 0500,
  should result sometime this morning. Get eyes on that.

  GI — he's NPO obviously, OG tube placed in the cath lab, confirmed on CXR.
  Nothing going through it right now. No bowel sounds but that's expected with the
  propofol and everything.

  Now — the fem sheath. It's still in from the cath lab. Right femoral. Cath lab
  said they'd come pull it this morning, but they haven't been up yet. I've been
  doing distal pulse checks on that right leg every hour — dorsalis pedis and
  posterior tib. I'm getting them but they're faint. Left leg is fine. Do not let
  that sheath go unchecked. If that right leg goes cold or loses pulses, that's an
  emergency, call the team immediately.

  Skin — cool extremities all around, mottled a little on the lower legs. I've
  documented it. That's expected with the hemodynamics and post-arrest picture, but
  watch it. No pressure injuries. He's been repositioned twice since he got up from
  the lab.

  Lines — right IJ triple lumen. That's your drip line, amiodarone and norepi
  running there. 18 gauge left hand — I've used it, it's good, flushed clean.
  Right femoral sheath — that's access but don't use it for meds, it's coming out.
  Left radial arterial line — waveform is sharp, correlates with cuff on the right
  arm within a few points. Trust it.

  Family — his wife and adult son are in the waiting room. They've been there all
  night. The son has been the more composed one — wife is understandably a mess.
  Nobody has given them an update since about 0300, so they're going to be looking
  for the team this morning. MICU attending is supposed to do a family meeting
  before rounds. Just know they're out there waiting.

  Big items for your shift: TTM decision, fem sheath pull, PTT result with heparin
  adjustment, repeat troponin, and watching that right leg. That's your morning.

  Any questions?

