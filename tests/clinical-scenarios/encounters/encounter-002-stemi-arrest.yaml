notes: |
  Post-arrest STEMI with intra-procedural VF is a realistic cath lab complication.
  The TTM2 trial (2021) changed practice — active cooling to 33°C is no longer
  routine standard of care; current AHA guidance is prevent fever (≤37.5°C) and
  follow local protocol. The protocol-reference skill must not state 33°C cooling
  as universal standard without that caveat.
  The fem sheath distal pulse check is a classic post-cath nursing priority — missing
  it in any structured output would be a fail. Amiodarone central-line-only is a
  real safety point (vesicant, requires central access for prolonged infusion).
  GCS 3T scoring (intubated) is intentionally ambiguous — the skill should flag that
  sedation confounds neurological interpretation and GCS alone doesn't determine
  prognosis in the post-arrest period.
