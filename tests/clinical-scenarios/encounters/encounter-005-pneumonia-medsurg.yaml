notes: |
  Classic med-surg CAP with complicating comorbidities. CURB-65 of 3 sits in the
  "consider ICU" range — this is the real bedside tension. BUN-to-mmol conversion
  (divide by 2.8) is a common nursing stumble; the test validates Noah gets it right.
  Levo/amoxicillin allergy question is a teaching moment — no cross-reactivity, but
  the nurse appropriately checks. Eliquis interaction is real (modest bleeding risk
  potentiation) and nurses on anticoagulated patients always ask.
