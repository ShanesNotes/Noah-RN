test_id: "encounter-005"
description: "Community-acquired pneumonia, med-surg floor — CURB-65 scoring, renal-adjusted abx, disposition question"
severity: moderate
patient_handoff: |
  Morning. Okay so I've got a 79-year-old male for you. Full code. He's in room 22.
  Allergies: amoxicillin — hives.
  Covering: hospitalist Dr. Patel.

  He came in from home yesterday. Wife noticed he'd been getting more short of breath
  over about three days, productive cough with yellow-green sputum. Temp in the ED was
  38.6. CXR showed a right lower lobe infiltrate. Procalcitonin came back at 1.8.
  They admitted him for community-acquired pneumonia. Started him on levofloxacin 750
  milligrams IV daily — that's already been adjusted for his kidneys. His history is
  COPD on home O2 at 2 liters, CHF with an EF of 35%, and afib on Eliquis.

  He had a rough overnight looking-wise but he's been stable. Didn't need anything
  escalated. Cultures are pending — the 24-hour mark is this afternoon, so that's
  something to keep an eye on.

  Neurologically he's alert and oriented times four. Really pleasant man. No complaints
  of confusion or anything like that.

  He's got a productive cough, bringing up yellow sputum. O2 is at 3 liters nasal cannula —
  his home baseline is 2 liters — and he's sitting 92 to 93 percent. Crackles at the
  right base. Respiratory rate has been in the low twenties today. His RR in the ED was
  24, which I documented.

  Afib, rate controlled, running 82 to 88. BP is 128 over 74. Good peripheral pulses.
  No significant edema beyond his baseline.

  He's eating about half his meals. No nausea, bowel sounds present, regular BMs per him.
  Voiding on his own, adequate output. I haven't been tracking strict I&O but he's
  clearly not dry.

  He's ambulating with a walker — PT cleared him for hall walks with assist yesterday.
  Morse fall risk is 55 so moderate, fall precautions are up. Skin is intact. Thin skin
  for his age — worth being mindful with tape and repositioning.

  Labs: WBC 14.2, BUN 32, creatinine 1.4, sodium 138, potassium 4.1. Repeat CXR is
  ordered for today, we'll see if that infiltrate is changing.

  Lines: 22 gauge right forearm, running well.

  Wife calls every morning at 8am. Her number is on the whiteboard.

  The question on my mind — and Dr. Patel was asking about it last night — is where does
  this guy fall on CURB-65. He's not confused, but BUN 32 is about 11.4 millimolar so
  that counts. His RR was 24 in the ED. BP has been fine. And he's 79. So I count that
  as a 3. Does he need to be stepped up?

