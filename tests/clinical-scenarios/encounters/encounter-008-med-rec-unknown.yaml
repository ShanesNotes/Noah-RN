      - patient_identification_with_code_status
      - dnr_dni_prominently_noted
      - allergies_on_separate_line
      - probable_ace_inhibitor_allergy_flagged
      - providers_and_consults
      - medication_reconciliation_incomplete_flagged
      - xarinol_unknown_medication_flagged
      - orthostatic_hypotension_documented
      - fall_risk_with_morse_score
      - lines_with_condition_notes
      - to_do_items
