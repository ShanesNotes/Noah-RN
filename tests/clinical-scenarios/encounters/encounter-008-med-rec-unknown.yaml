      - orientation_deficit_noted
      - pain_assessment
      - pulmonary_assessment
      - cardiovascular_assessment
      - orthostatic_findings_documented
      - skin_assessment_with_bruising_noted
      - fall_risk_assessment
      - lines_inventory
      - medication_hold_flagged
    must_not_contain:
