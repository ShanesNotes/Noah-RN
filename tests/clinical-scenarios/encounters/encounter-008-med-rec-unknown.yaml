---
test_id: "encounter-008"
description: "New admission, medication reconciliation, unknown medication, interaction concerns — 83F syncopal fall, afib on anticoagulation, polypharmacy"
severity: moderate
patient_handoff: |
  Good morning. Room 19, med-surg. 83-year-old female, DNR/DNI — that's documented,
  make sure it's visible on the board and in the chart. Covering is Dr. Haskell,
  hospitalist.

  Allergies — and this is where it gets complicated. She says she has "lots." What
  she could give us: aspirin, ibuprofen — both NSAIDs, consistent. And then "that
  blood pressure pill that made her cough." Daughter thinks it was a blood pressure
  medication but doesn't know the name. That's almost certainly an ACE inhibitor —
  the cough is a dead giveaway — but we don't have the name. Pharmacy is flagging
  it as probable ACE-I allergy, unspecified. Don't give anything in that class until
  it's confirmed.

  She came in overnight via ER after a syncopal episode at home. Fell, no loss of
  consciousness per the family — daughter Linda found her on the floor, not sure
  how long she'd been there, called 911. No head strike that they know of. CT head
  in the ED was negative. No fractures on plain films. So the ER worked her up,
  admitted her for syncope workup. She's on telemetry, they're doing an echo this
  morning, and they did orthostatics — which were positive. Sitting BP was 108/62,
  standing dropped to 92/58. That's probably your syncope story right there, but
  they want to rule out arrhythmia given the afib history.

  History: hypertension, atrial fibrillation, osteoporosis, chronic back pain,
  anxiety. Lives alone, daughter checks in daily, doesn't live with her.

  Now — the med list. This is the whole reason you need to be paying attention this
  morning. She brought a grocery bag of pill bottles to the ER. Some are expired.
  Some she says she doesn't take anymore. Some she doesn't know what they are. The
  daughter tried to help but she doesn't fill the prescriptions, so she doesn't
  have great information. Here's what we've pieced together so far:

  Metoprolol 25mg PO BID — she confirms she takes this.
  Eliquis 5mg PO BID — for the afib. She knows this one, she knows it's her blood
  thinner.
  Amlodipine 5mg PO daily — for blood pressure, she thinks. Makes sense given the
  hypertension.
  Gabapentin 300mg PO TID — for her back. She takes it "most of the time."
  Lorazepam 0.5mg PO PRN — for anxiety. Here's the flag: the daughter says she
  takes it "a lot." We don't have a frequency. The bottle doesn't have a date on
  the label anymore, and the pill count doesn't tell us much. That PRN in an
  83-year-old on an anticoagulant, with gabapentin — that's a Beers Criteria issue
  and it's probably contributing to the fall risk.
  Calcium with vitamin D — she takes it daily, it's over the counter, she knows
  it.
  And then there's the unknown. The bottle is labeled "Xarinol." She doesn't know
  what it's for. Daughter doesn't recognize it. Label is faded, barely readable.
  Could be a brand name we don't recognize, could be foreign market, could be
  something old that got relabeled incorrectly. Pharmacy hasn't been able to
  identify it yet. That bottle needs to go to pharmacy this morning — do not
  administer it.

  Assessment now: Alert, oriented times three — a little fuzzy on the date,
  otherwise knows where she is and who she is. Pleasant, chatty. Denies pain
  currently. Room air, sats 97%. Afib rate controlled at 72. BP sitting 108/62
  standing 92/58 — positive orthostatics as I said. Eating okay, took her morning
  pills without trouble — except we held the Xarinol pending ID. Ambulatory with
  a walker, steady gait but she is a fall risk. Morse score is 65. We've got bed
  alarm on, non-skids on her feet, call light in reach.

  Skin — thin, as you'd expect in an 83-year-old on anticoagulation. She's got some
  shin bruising, both legs, ecchymotic patches, consistent with the anticoagulation
  and tissue fragility. No open areas. Braden needs to be scored this shift.

  Access: 22 gauge left hand, saline lock. It's good, flushed clean, no signs of
  infiltration.

  Pharmacist — Maria from pharmacy — is coming by this morning to do the formal
  med rec. She knows about the Xarinol and she's already been notified. She'll be
  up by 0900 she said. Make sure the pill bottle is at the bedside when she comes.

  Family: daughter Linda usually comes after work, around 5pm. Phone number is on
  the whiteboard. She said to call if anything changes.

  To-do list I'm leaving you: formal med rec with pharmacy at 0900, echo is
  scheduled — transport will call you, telemetry monitoring for any rhythm issues,
  orthostatic repeat per the hospitalist order this afternoon, fall precautions in
  place, and that Xarinol needs to get identified before we give it.

  Any questions?

skills_exercised:
  - skill: drug-reference
    trigger: "Look up Xarinol — it's an unknown medication, bottle label is faded. Patient brought it from home, pharmacy hasn't identified it yet."
    must_contain:
