notes: |
  Manual check: 400 mg / 250 mL = 1.6 mg/mL = 1600 mcg/mL.
  Dose = 5 mcg/kg/min × 78 kg = 390 mcg/min.
  Rate = (390 mcg/min) / (1600 mcg/mL) × 60 min/hr ≈ 14.6 mL/hr.
  Skill SKILL.md rule: "always echo back the concentration you used" — this is load-bearing for safety.
