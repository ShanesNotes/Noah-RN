# .pi/skills/hello-nurse/dependencies.yaml
# Promoted to Pi-native: 2026-04-13
#
# The simplest skill. No tools, no services, no knowledge assets.
# Just presence.

skill: hello-nurse
version: "1.0.0"
complexity_tier: simple

input_modes:
  direct:
    extension: none
    then: invoke_skill_directly
    description: "Someone said hello."

extensions: {}
tools: []
knowledge_assets: []
services: []

conventions:
  path: packages/workflows/CONVENTIONS.md
  covers:
    - universal_rules

# Note: this router metadata diverges from packages/agent-harness/router/clinical-router.md
# which uses intent: plugin_check and triggers: "test noah", "hello nurse", "verify plugin".
# The Pi-native version expands triggers and changes intent to reflect the behavioral fork.
router:
  scope: greeting
  trigger_phrases:
    - "hello nurse"
    - "hello noah"
    - "test noah"
    - "verify plugin"
    - "are you there"
    - "who are you"
    - "κύριε ἐλέησον"
  intent: greeting
  complexity: simple
  hitl_category: "I"
  diverges_from: packages/agent-harness/router/clinical-router.md
