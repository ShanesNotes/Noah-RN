name: ui-generation
version: "1.0.0"
type: dev-skill

delegate:
  preferred_agent: gemini-3.1-pro-preview
  cli: google-gemini-cli
  fallback_agent: claude
  reason: >
    Constrained visual generation — strict style rules, code output,
    no clinical reasoning needed. Gemini is fast and cheap for this.

extensions: []

knowledge_assets:
  - id: design-system
    type: inline
    note: Design language defined in SKILL.md body — no external file needed

services: []

conventions:
  - packages/workflows/CONVENTIONS.md  # only for cross-project consistency

router_metadata:
  scope: ui_generation
  input_modes:
    description:
      action: generate_component
    screenshot:
      action: match_and_generate
    refactor:
      action: restyle_existing
