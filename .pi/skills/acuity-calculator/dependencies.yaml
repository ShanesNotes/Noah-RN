# .pi/skills/acuity-calculator/dependencies.yaml
# Promoted to Pi-native: 2026-04-13

skill: acuity-calculator
version: "1.0.0"
complexity_tier: moderate

input_modes:
  direct:
    extension: none
    then: invoke_skill_directly
    description: >-
      Nurse provides component values for APACHE II or NEWS2.
      The skill calls the corresponding bash calculator tool.
  missing:
    action: request_required_context
    prompt: "Which severity score, and what are the component values?"

extensions:
  noah-clinical-tools:
    required: true
    provides:
      - tool_family: trace
        purpose: "Invocation tracing"

tools:
  - name: apache2.sh
    path: tools/clinical-calculators/apache2.sh
    purpose: "APACHE II ICU severity score"
  - name: news2.sh
    path: tools/clinical-calculators/news2.sh
    purpose: "NEWS2 early warning score"

knowledge_assets:
  - name: cross-skill-triggers
    path: clinical-resources/templates/cross-skill-triggers.md
    purpose: "Post-output suggestions"
  - name: disclaimers
    path: clinical-resources/templates/disclaimers.md
    purpose: "Disclaimer footer"

services: []

conventions:
  path: packages/workflows/CONVENTIONS.md
  covers:
    - trace_logging
    - confidence_tiers
    - universal_rules
    - disclaimers
    - provenance_footer
    - cross_skill_suggestions

router:
  scope: clinical_scoring
  trigger_phrases:
    - "APACHE"
    - "APACHE II"
    - "severity score"
    - "NEWS2"
    - "early warning"
    - "track and trigger"
    - "deterioration"
    - "acuity"
  intent: acuity_scoring
  complexity: moderate
  hitl_category: "II"
