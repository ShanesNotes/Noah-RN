# .pi/skills/drug-reference/dependencies.yaml
# Promoted to Pi-native: 2026-04-13

skill: drug-reference
version: "1.2.0"
complexity_tier: moderate

input_modes:
  direct:
    extension: none
    then: invoke_skill_directly
    description: >-
      Nurse provides a medication name. The skill checks the high-alert list,
      calls the OpenFDA lookup tool, and returns a bedside summary.
  missing:
    action: request_required_context
    prompt: "Which medication are you asking about?"

extensions:
  noah-clinical-tools:
    required: true
    provides:
      - tool_family: trace
        purpose: "Invocation tracing"

tools:
  - name: lookup.sh
    path: tools/drug-lookup/lookup.sh
    purpose: "OpenFDA drug label lookup — returns structured JSON"
    note: "Requires network access to api.fda.gov"

knowledge_assets:
  - name: cross-skill-triggers
    path: clinical-resources/templates/cross-skill-triggers.md
    purpose: "Post-output suggestions"
  - name: disclaimers
    path: clinical-resources/templates/disclaimers.md
    purpose: "Disclaimer footer"

services: []

conventions:
  path: packages/workflows/CONVENTIONS.md
  covers:
    - trace_logging
    - confidence_tiers
    - universal_rules
    - disclaimers
    - provenance_footer
    - cross_skill_suggestions

router:
  scope: medication_reference
  trigger_phrases:
    - "look up"
    - "drug reference"
    - "what is"
    - "tell me about"
    - "hold parameters"
    - "side effects"
    - "black box"
    - "high alert"
    - "interactions"
    - "dosing"
  intent: medication_query
  complexity: moderate
  hitl_category: "II"
